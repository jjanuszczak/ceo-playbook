<div class="faq-item border-b border-neutral-200 dark:border-neutral-700 pb-4 mb-4" 
     data-question="{{ .Get "question" }}" 
     data-answer="{{ .Inner | plainify | chomp }}">
    <h3 class="text-xl font-semibold mb-2 flex items-start">
        <span class="text-primary-500 mr-2 text-2xl leading-none">?</span>
        {{ .Get "question" }}
    </h3>
    <div class="pl-6 text-neutral-700 dark:text-neutral-300">
        {{ .Inner | markdownify }}
    </div>
</div>
