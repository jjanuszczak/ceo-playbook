{{ $kit := .Site.Params.kit }}
<div class="footer-subscribe w-full">
  <h3 class="text-base font-bold uppercase tracking-widest mb-3 border-b border-neutral-200 dark:border-neutral-700 pb-2 inline-block">
    The Signal
  </h3>
  <p class="text-sm text-neutral-600 dark:text-neutral-400 mb-6 leading-relaxed">
    Weekly intelligence on technology & Strategy for the C-Suite.
  </p>
  
  <div id="footer-kit-success" class="hidden text-sm font-medium text-primary-600 dark:text-primary-400 mb-4">
    Success! Check your email to confirm.
  </div>

  <form id="footer-kit-form" 
        action="https://app.kit.com/forms/{{ $kit.formID }}/subscriptions" 
        method="post" 
        data-sv-form="{{ $kit.formID }}" 
        data-uid="{{ $kit.uid }}"
        class="flex flex-col gap-4">
    <div class="relative w-full">
      <input type="email" name="email_address" required 
             placeholder="exec@company.com"
             class="w-full px-4 py-2 text-sm rounded-md border border-neutral-300 dark:border-neutral-600 bg-white text-neutral-900 focus:ring-2 focus:ring-primary-500 outline-none transition-all" />
    </div>
    <button type="submit" 
            class="w-full px-4 py-2 text-sm font-bold rounded-md bg-primary-600 hover:bg-primary-700 text-white transition-colors uppercase tracking-wider">
      Subscribe
    </button>
  </form>
</div>

<script>
  (function() {
    const form = document.getElementById('footer-kit-form');
    const successMsg = document.getElementById('footer-kit-success');

    if (!form) return;

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const formData = new FormData(form);
      
      fetch(form.action, {
        method: 'POST',
        body: formData,
        headers: { 'Accept': 'application/json' }
      })
      .then(response => {
        form.style.display = 'none';
        successMsg.classList.remove('hidden');
      })
      .catch(error => {
        console.error('Subscription error:', error);
        form.style.display = 'none';
        successMsg.classList.remove('hidden');
      });
    });
  })();
</script>
