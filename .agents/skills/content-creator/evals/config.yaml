pipeline:
  target_version: "v1.0"
  steps:
    - name: "Git Branch Verification"
      id: "git"
      script: "checks/git_check.py"
      halt_on_fail: true
    - name: "GitHub Issue Verification"
      id: "github"
      script: "checks/github_check.py"
      halt_on_fail: false
    - name: "Hugo Bundle Verification"
      id: "bundle"
      script: "checks/bundle_check.py"
      halt_on_fail: true
